{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Weatherpins</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'photos/brand/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'photos/brand/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'photos/brand/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'photos/brand/apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'photos/brand/site.webmanifest' %}">
    <link rel="stylesheet" href="{% static 'photos/css/main.css' %}">

</head>
<body class="auth-page">
    <main class="login-card">
        <img
            src="{% static 'photos/brand/weatherpins-logo.png' %}"
            alt="Weatherpins"
            class="brand-logo"
        >
        <h1 class="login-title">Вход</h1>

        {% if form.errors %}
            <div class="error-box">
                Неверное имя пользователя или пароль. Попробуйте ещё раз.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="login-button">Войти</button>
        </form>

        <div class="register-link">
            Нет аккаунта?
            <a href="{% url 'register' %}">Зарегистрироваться</a>
        </div>
    </main>
</body>
</html>
