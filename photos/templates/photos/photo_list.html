{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Weatherpins — карта фотографий</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{% static 'photos/brand/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'photos/brand/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'photos/brand/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'photos/brand/apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'photos/brand/site.webmanifest' %}">

    <!-- OpenLayers CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css">
    <!-- OpenLayers JS -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { width: 100vw; height: 100vh; }

        /* Кнопка загрузки фото */
        .map-actions {
            position: absolute;
            top: 12px;
            left: 70px;
            z-index: 1000;

            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .map-action-btn {
            width: 190px;
            box-sizing: border-box;

            display: block;
            padding: 9px 12px;

            border-radius: 8px;
            text-align: center;
            text-decoration: none;

            color: white;
            font-family: Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.2;

            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .upload-btn {
            background: #4a90e2;
        }

        .my-photos-btn {
            background: #4caf50;
        }

        @media (max-width: 600px) {
            .map-actions {
                top: 10px;
                left: 64px;
                gap: 6px;
            }

            .map-action-btn {
                width: 165px;
                font-size: 14px;
                padding: 8px 10px;
            }
        }

        /* Блок с именем пользователя и кнопкой Выйти */
        .user-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            gap: 5px;
            align-items: center;
            background: rgba(255,255,255,0.9);
            padding: 6px 12px;
            border-radius: 8px;
        }
        .user-bar a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        .user-bar a:hover {
            text-decoration: underline;
        }

        .popup-overlay {
            --drag-x: 0px;
            --drag-y: 0px;
            position: relative;
        }
        .popup-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            padding: 16px;
            min-width: 200px;
            max-width: 240px;
            font-size: 14px;
            position: relative;
            transform: translate(var(--drag-x, 0px), var(--drag-y, 0px));
            user-select: text;
        }
        .popup-card.is-dragging,
        .popup-card.is-dragging * {
            cursor: grabbing;
            user-select: none;
        }
        .popup-drag-handle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: -6px 22px 8px 0;
            padding: 4px 8px;
            border-radius: 6px;
            background: #f5f7fa;
            color: #555;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.2;
            cursor: grab;
            touch-action: none;
        }
        .popup-drag-handle:active {
            cursor: grabbing;
        }
        .popup-card img {
            display: block;
            margin: 8px auto;
            max-width: 150px;       /* <-- ограничиваем ширину */
            width: auto;            /* сохраняем пропорции */
            height: auto;
            border-radius: 8px;
        }
        .weather-info {
            background: #f5f7fa;
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
            text-align: center;
        }
        .climate-info {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            color: #0f172a;
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
            text-align: center;
            line-height: 1.35;
        }
        .place-info {
            font-style: italic;
            color: #555;
            margin: 4px 0;
        }
        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
        }
        .edit-btn {
            display: inline-block;
            background: #4a90e2;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            margin-top: 8px;
            margin-right: 6px;
        }
        .edit-btn:hover {
            background: #357abd;
        }
        .popup-close-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 16px;
            line-height: 24px;
            text-align: center;
            cursor: pointer;
            color: #333;
            padding: 0;
        }
        .popup-close-btn:hover {
        background: #e0e0e0;
        }
        .message-success {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            background-color: #e8f5e9;
            color: #1b5e20;
        }
        .message-error {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            background-color: #ffebee;
            color: #b71c1c;
        }
        .message-warning {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            background-color: #fff3e0;
            color: #e65100;
        }
    </style>
</head>
<body>

    {% if messages %}
  <ul style="list-style: none; padding: 0; position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 2000; min-width: 300px;">
    {% for message in messages %}
      <li class="
          {% if 'error' in message.tags %}message-error
          {% elif 'warning' in message.tags %}message-warning
          {% elif 'success' in message.tags %}message-success
          {% endif %}
      ">
        {{ message }}
      </li>
    {% endfor %}
  </ul>
{% endif %}

    <div id="map"></div>

    <!-- Кнопка Загрузить фото (только для авторизованных) -->
    {% if user.is_authenticated %}
        <div class="map-actions">
            <a href="{% url 'upload_photo' %}" class="map-action-btn upload-btn">
                📤 Загрузить фото
            </a>

            <a href="{% url 'user_photos' %}" class="map-action-btn my-photos-btn">
                ← Мои фото
            </a>
        </div>
        <div class="user-bar">
            <span>{{ user.username }}</span>
            <a href="{% url 'profile' %}">Профиль</a>
            <a href="{% url 'logout' %}">Выйти</a>
        </div>
    {% else %}
        <div class="user-bar">
            <a href="{% url 'login' %}">Войти</a>
        </div>
    {% endif %}

    <!-- Скрытое поле для CSRF-токена (нужно для удаления) -->
    {% csrf_token %}

    <script>
        // ---------- 1. Функция для получения CSRF-токена из куки ----------
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');
        const targetPhotoId = new URLSearchParams(window.location.search).get('photo_id');

        // ---------- 2. Создание карты ----------
        const map = new ol.Map({
            target: 'map',
            layers: [
                // Слой с тайлами OpenStreetMap
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([37.62, 55.75]), // Москва
                zoom: 4
            })
        });

        // ---------- 3. Векторный слой для фотографий ----------
        const regularPhotoStyle = new ol.style.Style({
            image: new ol.style.Icon({
                src: "{% static 'photos/brand/map-pin.svg' %}",
                anchor: [0.5, 1],
                anchorXUnits: "fraction",
                anchorYUnits: "fraction",
                scale: 0.55
            })
        });
        const publicPhotoStyle = new ol.style.Style({
            image: new ol.style.Icon({
                src: "{% static 'photos/brand/map-pin-public.svg' %}",
                anchor: [0.5, 1],
                anchorXUnits: "fraction",
                anchorYUnits: "fraction",
                scale: 0.55
            })
        });
        const selectedPhotoStyle = new ol.style.Style({
            image: new ol.style.Icon({
                src: "{% static 'photos/brand/map-pin.svg' %}",
                anchor: [0.5, 1],
                anchorXUnits: "fraction",
                anchorYUnits: "fraction",
                scale: 0.65
            })
        });
        const selectedPublicPhotoStyle = new ol.style.Style({
            image: new ol.style.Icon({
                src: "{% static 'photos/brand/map-pin-public.svg' %}",
                anchor: [0.5, 1],
                anchorXUnits: "fraction",
                anchorYUnits: "fraction",
                scale: 0.65
            })
        });
        let selectedFeature = null;

        function getPhotoStyle(feature) {
            return feature.get("is_public") ? publicPhotoStyle : regularPhotoStyle;
        }

        function getSelectedPhotoStyle(feature) {
            return feature.get("is_public") ? selectedPublicPhotoStyle : selectedPhotoStyle;
        }

        const vectorSource = new ol.source.Vector({
            url: '/photos/data.json',
            format: new ol.format.GeoJSON()
        });
        const vectorLayer = new ol.layer.Vector({
            source: vectorSource,
            style: getPhotoStyle
        });
        map.addLayer(vectorLayer);

        // Меняем курсор при наведении на маркер
        map.on('pointermove', function(e) {
            const hit = map.forEachFeatureAtPixel(e.pixel, function() { return true; });
            map.getTargetElement().style.cursor = hit ? 'pointer' : '';
        });

        // ---------- 4. Оверлей для попапа ----------
        const popupElement = document.createElement('div');
        popupElement.className = 'popup-overlay';
        popupElement.style.display = 'none';
        document.body.appendChild(popupElement);
        const popupOverlay = new ol.Overlay({
            element: popupElement,
            autoPan: true,
            positioning: 'bottom-center'
        });
        map.addOverlay(popupOverlay);

        let popupDragOffsetX = 0;
        let popupDragOffsetY = 0;
        let isPopupDragging = false;
        let popupDragStartX = 0;
        let popupDragStartY = 0;
        let popupDragStartOffsetX = 0;
        let popupDragStartOffsetY = 0;

        function applyPopupDragOffset() {
            popupElement.style.setProperty('--drag-x', `${popupDragOffsetX}px`);
            popupElement.style.setProperty('--drag-y', `${popupDragOffsetY}px`);
        }

        function resetPopupDragOffset() {
            popupDragOffsetX = 0;
            popupDragOffsetY = 0;
            isPopupDragging = false;
            applyPopupDragOffset();
            popupElement.querySelector('.popup-card')?.classList.remove('is-dragging');
        }

        popupElement.addEventListener('pointerdown', function(event) {
            const handle = event.target.closest('.popup-drag-handle');
            if (!handle) return;

            event.preventDefault();
            event.stopPropagation();

            isPopupDragging = true;
            popupDragStartX = event.clientX;
            popupDragStartY = event.clientY;
            popupDragStartOffsetX = popupDragOffsetX;
            popupDragStartOffsetY = popupDragOffsetY;

            popupElement.querySelector('.popup-card')?.classList.add('is-dragging');
            handle.setPointerCapture?.(event.pointerId);
        });

        window.addEventListener('pointermove', function(event) {
            if (!isPopupDragging) return;

            event.preventDefault();
            event.stopPropagation();

            popupDragOffsetX = popupDragStartOffsetX + event.clientX - popupDragStartX;
            popupDragOffsetY = popupDragStartOffsetY + event.clientY - popupDragStartY;
            applyPopupDragOffset();
        }, { passive: false });

        window.addEventListener('pointerup', function(event) {
            if (!isPopupDragging) return;

            event.preventDefault();
            event.stopPropagation();

            isPopupDragging = false;
            popupElement.querySelector('.popup-card')?.classList.remove('is-dragging');
        });

        window.addEventListener('pointercancel', function() {
            isPopupDragging = false;
            popupElement.querySelector('.popup-card')?.classList.remove('is-dragging');
        });

        // ---------- 5. Функция закрытия попапа ----------
        function closePopup() {
            popupElement.style.display = 'none';
            resetPopupDragOffset();
            selectFeature(null);
        }

        function selectFeature(feature) {
            if (selectedFeature && selectedFeature !== feature) {
                selectedFeature.setStyle(getPhotoStyle(selectedFeature));
            }
            selectedFeature = feature;
            if (selectedFeature) {
                selectedFeature.setStyle(getSelectedPhotoStyle(selectedFeature));
            }
        }

        function escapeHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function isPresent(value) {
            return value !== null && value !== undefined && value !== '';
        }

        function formatWeather(props) {
            const emoji = props.weather_emoji || '🌡️';
            const label = props.weather_label || 'Нет данных';
            const cssClass = props.weather_css_class || 'unknown';
            const lines = [
                `<div><strong>${escapeHtml(emoji)} ${escapeHtml(label)}</strong></div>`
            ];

            if (props.weather_source === 'hourly') {
                if (isPresent(props.weather_temperature)) {
                    lines.push(`<div>Температура: ${escapeHtml(props.weather_temperature)} °C</div>`);
                }
                if (isPresent(props.weather_precipitation)) {
                    lines.push(`<div>Осадки за час: ${escapeHtml(props.weather_precipitation)} мм</div>`);
                }
                if (isPresent(props.weather_time_display)) {
                    lines.push(`<div>Данные за: ${escapeHtml(props.weather_time_display)}</div>`);
                }
            } else if (props.weather_source === 'daily') {
                const hasMax = isPresent(props.weather_temperature_max);
                const hasMin = isPresent(props.weather_temperature_min);
                if (hasMax || hasMin) {
                    lines.push(
                        `<div>Температура: ${hasMax ? escapeHtml(props.weather_temperature_max) : '?'} / ${hasMin ? escapeHtml(props.weather_temperature_min) : '?'} °C</div>`
                    );
                }
                if (isPresent(props.weather_precipitation)) {
                    lines.push(`<div>Осадки: ${escapeHtml(props.weather_precipitation)} мм</div>`);
                }
            }

            if (lines.length === 1 && label === 'Нет данных') {
                return `<div class="weather-info weather-${escapeHtml(cssClass)}">Нет данных</div>`;
            }

            return `<div class="weather-info weather-${escapeHtml(cssClass)}">${lines.join('')}</div>`;
        }

        function formatTemperature(value) {
            if (!isPresent(value)) return '';
            const numberValue = Number(value);
            if (!Number.isFinite(numberValue)) {
                return escapeHtml(value);
            }
            return `${numberValue > 0 ? '+' : ''}${numberValue.toFixed(1)}`;
        }

        function formatClimate(props) {
            if (!isPresent(props.climate_comparison_text)) {
                return '';
            }

            const lines = [
                `<div>📊 ${escapeHtml(props.climate_comparison_text)}</div>`
            ];

            if (isPresent(props.climate_normal_temperature)) {
                lines.push(
                    `<div>Обычно: ${formatTemperature(props.climate_normal_temperature)} °C</div>`
                );
            }

            return `<div class="climate-info">${lines.join('')}</div>`;
        }

        function openPhotoPopup(feature) {
            const props = feature.getProperties();
            const lonLat = feature.get('lonLat') || feature.getGeometry().getCoordinates();
            const id = props.id;
            const date = props.date;
            const weather = formatWeather(props);
            const climate = formatClimate(props);
            const imageUrl = props.image_url;

            // Строим HTML попапа
            const html = `
                <div class="popup-card">
                    <div class="popup-drag-handle" title="Перетащить карточку">↕ Перетащить</div>
                    <button class="popup-close-btn" onclick="closePopup()" title="Закрыть">✕</button>
                    <b>${date}</b><br>
                    <img src="${imageUrl}" alt="Фото">
                    ${weather}
                    ${climate}
                    <div class="place-info" id="place-${id}">Загрузка места...</div>
                    <a class="edit-btn" href="/photos/edit/${id}/">Редактировать</a>
                    <button class="delete-btn" onclick="deletePhoto(${id}, this)">🗑️ Удалить</button>
                </div>
            `;
            resetPopupDragOffset();
            popupElement.innerHTML = html;
            applyPopupDragOffset();
            popupElement.style.display = 'block';
            popupOverlay.setPosition(lonLat);
            selectFeature(feature);

            // Запрашиваем место через Nominatim (как и раньше)
            const placeSpan = document.getElementById('place-' + id);
            if (placeSpan && !placeSpan.dataset.loaded) {
                const url = `/photos/place/?lat=${ol.proj.toLonLat(lonLat)[1]}&lon=${ol.proj.toLonLat(lonLat)[0]}`;
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        if (data.error) {
                            placeSpan.textContent = 'Место не определено';
                        } else {
                            let shortName = data.name || data.display_name;
                            if (data.display_name && data.display_name.includes(',')) {
                                shortName = data.display_name.split(',')[0].trim();
                            }
                            placeSpan.textContent = '📍 ' + shortName;
                            placeSpan.dataset.loaded = 'true';
                        }
                    })
                    .catch(err => {
                        placeSpan.textContent = 'Ошибка загрузки места';
                    });
            }
        }

        // ---------- 6. Обработка клика по карте (закрываем попап при клике в пустоту) ----------
        map.on('click', function(evt) {
            // Проверяем, попал ли клик по маркеру – если нет, закроем попап
            const feature = map.forEachFeatureAtPixel(evt.pixel, function(feature) {
                return feature;
            });
            if (!feature) {
                closePopup();
            }
        });

        // ---------- 7. Обработка клика по маркеру ----------
        vectorSource.on('featuresloadend', function() {
            // Событие featuresloadend вызывается, когда все объекты загружены
            const features = vectorSource.getFeatures();
            features.forEach(function(feature) {
                const lonLat = feature.getGeometry().getCoordinates();
                // Сохраняем координаты для оверлея
                feature.set('lonLat', lonLat);
                feature.setStyle(getPhotoStyle(feature));
            });

            if (targetPhotoId) {
                const targetFeature = features.find(function(feature) {
                    return String(feature.getProperties().id) === targetPhotoId;
                });

                if (targetFeature) {
                    const lonLat = targetFeature.get('lonLat');
                    map.getView().animate({
                        center: lonLat,
                        zoom: 12,
                        duration: 400
                    });
                    openPhotoPopup(targetFeature);
                }
            }
        });

        // Реальный клик по маркеру обрабатываем через Select interaction? Будем использовать click на карте с проверкой.
        map.on('singleclick', function(evt) {
            const feature = map.forEachFeatureAtPixel(evt.pixel, function(feature) {
                return feature;
            });
            if (feature) {
                openPhotoPopup(feature);
            } else {
                closePopup();
            }
        });

        // ---------- 8. Функция удаления фото ----------
        async function deletePhoto(photoId, buttonElement) {
            if (!confirm('Вы уверены, что хотите удалить это фото?')) return;
            try {
                const response = await fetch(`/photos/delete/${photoId}/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrftoken,
                        'X-Requested-With': 'XMLHttpRequest',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    // Закрываем попап
                    closePopup();
                    // Удаляем фичу из источника
                    const features = vectorSource.getFeatures();
                    for (const feature of features) {
                        if (feature.getProperties().id === photoId) {
                            vectorSource.removeFeature(feature);
                            break;
                        }
                    }
                } else {
                    alert('Ошибка: ' + (data.error || 'Не удалось удалить фото'));
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Сетевая ошибка при удалении');
            }
        }
    </script>
</body>
</html>
