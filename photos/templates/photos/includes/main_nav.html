<style>
    .main-nav {
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 10px 16px;
        margin: 0 0 18px;
        padding: 10px 12px;
        border: 1px solid #dbe3ef;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        font-family: Arial, sans-serif;
    }

    .main-nav-map {
        position: absolute;
        top: 12px;
        left: 70px;
        right: 12px;
        z-index: 1000;
        width: auto;
        max-width: calc(100vw - 82px);
        margin-bottom: 0;
        background: rgba(255, 255, 255, 0.94);
    }

    .main-nav-left,
    .main-nav-links {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 12px;
    }

    .main-nav-brand {
        color: #111827;
        font-size: 17px;
        font-weight: 800;
        text-decoration: none;
    }

    .main-nav-links a,
    .main-nav-user {
        color: #2563eb;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
        text-decoration: none;
    }

    .main-nav-links a:hover {
        text-decoration: underline;
    }

    .main-nav-user {
        color: #475569;
        overflow-wrap: anywhere;
    }

    @media (max-width: 640px) {
        .main-nav {
            align-items: flex-start;
            flex-direction: column;
            padding: 9px 10px;
        }

        .main-nav-map {
            top: 10px;
            left: 64px;
            right: 8px;
            max-width: calc(100vw - 72px);
        }

        .main-nav-brand {
            font-size: 16px;
        }

        .main-nav-links a,
        .main-nav-user {
            font-size: 14px;
        }
    }
</style>

<nav class="main-nav{% if main_nav_variant == 'map' %} main-nav-map{% endif %}" aria-label="Основная навигация">
    <div class="main-nav-left">
        <a href="{% url 'photo_list' %}" class="main-nav-brand">Weatherpins</a>
        {% if request.user.is_authenticated %}
            <span class="main-nav-user">@{{ request.user.username }}</span>
        {% endif %}
    </div>

    <div class="main-nav-links">
        {% if request.user.is_authenticated %}
            <a href="{% url 'photo_list' %}">Карта</a>
            <a href="{% url 'user_photos' %}">Мои фото</a>
            <a href="{% url 'upload_photo' %}">Загрузить фото</a>
            <a href="{% url 'profile' %}">Профиль</a>
            <a href="{% url 'logout' %}">Выйти</a>
        {% else %}
            <a href="{% url 'login' %}">Войти</a>
            <a href="{% url 'register' %}">Регистрация</a>
        {% endif %}
    </div>
</nav>
