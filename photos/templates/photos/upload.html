<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Загрузить фото</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input[type="file"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #357abd;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
        .message-error {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            background-color: #ffebee;
            color: #b71c1c;
        }
        .message-success {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            background-color: #e8f5e9;
            color: #1b5e20;
        }
    </style>
</head>
<body>
    {% if messages %}
  <ul style="list-style: none; padding: 0;">
    {% for message in messages %}
      <li class="
          {% if 'error' in message.tags %}message-error
          {% elif 'success' in message.tags %}message-success
          {% endif %}
      ">
        {{ message }}
      </li>
    {% endfor %}
  </ul>
    {% endif %}

    <h1>Загрузить фотографию</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input
            type="file"
            name="image"
            accept="image/*,.heic,.heif,image/heic,image/heif,image/heic-sequence,image/heif-sequence"
            multiple
        >
        <button type="submit">Загрузить</button>
    </form>
    <a href="{% url 'photo_list' %}" class="back-link">Вернуться на карту</a>
</body>
</html>
